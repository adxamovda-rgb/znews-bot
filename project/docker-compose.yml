# ============================================
# Znews Bot — Docker Compose
# ============================================

version: "3.8"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: znews-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB_PATH to use persistent volume
      DB_PATH: /app/data/znews.db
    volumes:
      # Persistent database storage
      - bot_data:/app/data
      # Temporary files for motivation images
      - /tmp:/tmp
    networks:
      - znews-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  bot_data:
    driver: local

networks:
  znews-network:
    driver: bridge
